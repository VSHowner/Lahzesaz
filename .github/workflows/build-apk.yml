name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            git \
            zip \
            unzip \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libffi-dev \
            libssl-dev \
            cmake \
            libsqlite3-dev \
            liblzma-dev

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install \
            setuptools==69.5.1 \
            wheel \
            Cython==0.29.36 \
            buildozer==1.5.0 \
            python-for-android==2024.01.21

      - name: Clean previous Buildozer cache
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer

      - name: Show versions
        run: |
          python --version
          pip --version
          buildozer --version
          python -m pythonforandroid.toolchain --help

      - name: Build APK
        env:
          BUILDOZER_LOG_LEVEL: 2
        run: |
          buildozer android debug

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: LahzeSaz-APK
          path: bin/*.apk

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Buildozer-Logs
          path: |
            .buildozer/**/*.log
            .buildozer/**/build.log
