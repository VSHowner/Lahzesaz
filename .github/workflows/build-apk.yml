name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-22.04

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"


      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install system dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git \
            zip \
            unzip \
            autoconf \
            automake \
            libtool \
            libtool-bin \
            autopoint \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libffi-dev \
            libssl-dev \
            cmake \
            libsqlite3-dev \
            liblzma-dev


      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip


      - name: Install Python build tools
        run: |

          pip install \
            setuptools==69.5.1 \
            wheel==0.43.0 \
            Cython==0.29.36

          pip install \
            buildozer==1.5.0


      - name: Clean cache
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer
          rm -rf ~/.cache/pip


      - name: Configure Android environment
        run: |

          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

          echo "ANDROIDSDK=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV

          echo "ANDROIDNDK=$HOME/.buildozer/android/platform/android-ndk-r25b" >> $GITHUB_ENV

          echo "ANDROIDAPI=34" >> $GITHUB_ENV

          echo "ANDROIDMINAPI=24" >> $GITHUB_ENV



      - name: Install fixed python-for-android
        run: |

          mkdir -p ~/.buildozer/android/platform

          git clone \
            --depth 1 \
            -b v2024.01.21 \
            https://github.com/kivy/python-for-android.git \
            ~/.buildozer/android/platform/python-for-android


      - name: Check versions
        run: |

          python --version
          pip --version
          cython --version
          buildozer --version



      - name: Build APK
        env:
          BUILDOZER_LOG_LEVEL: 2

        run: |

          buildozer android debug



      - name: Upload APK
        if: success()

        uses: actions/upload-artifact@v4

        with:

          name: LahzeSaz-APK

          path: bin/*.apk



      - name: Upload Logs
        if: always()

        uses: actions/upload-artifact@v4

        with:

          name: LahzeSaz-Build-Logs

          path: |

            .buildozer/**/*.log

            .buildozer/**/build.log
